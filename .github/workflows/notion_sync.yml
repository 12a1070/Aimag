name: Notion Sync
on:
  issue_comment:
    types: [created]

jobs:
  sync:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'iineineno03k' &&
      (startsWith(github.event.comment.body, 'question') || startsWith(github.event.comment.body, 'search'))
    runs-on: ubuntu-latest
    steps:
      - name: Send to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          COMMENT=$(echo "${{ github.event.comment.body }}" | jq -Rsa .)
          TITLE=$(echo "${{ github.event.issue.title }}" | jq -Rsa .)
          curl -X POST 'https://api.notion.com' \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data "{
              \"parent\": { \"database_id\": \"$DATABASE_ID\" },
              \"properties\": {
                \"タイトル\": { \"title\": [ { \"text\": { \"content\": $TITLE } } ] },
                \"コメント内容\": { \"rich_text\": [ { \"text\": { \"content\": $COMMENT } } ] },
                \"URL\": { \"url\": \"${{ github.event.comment.html_url }}\" }
              }
            }"
