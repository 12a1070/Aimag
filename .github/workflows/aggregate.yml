name: Aggregate Learning Logs

on:
  push:
    branches:
      - "phase*"
  pull_request:
    branches:
      - "phase*"
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  aggregate_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract conversation logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. ヘッダーの初期化
          echo "# 💡 学習記録・メンターフィードバック一覧" > LEARNING_LOG.md
          echo "最終更新日: $(date +'%Y-%m-%d %H:%M:%S') (JST)" >> LEARNING_LOG.md
          echo "このファイルは GitHub Actions により自動集計されています。" >> LEARNING_LOG.md
          echo "" >> LEARNING_LOG.md

          REPO="${{ github.repository }}"
          MENTOR="iineineno03k"

          # 2. 全てのPR番号を取得
          PR_LIST=$(gh pr list --repo $REPO --state all --limit 100 --json number --jq '.[].number')

          echo "--- 抽出開始 (Target: $REPO) ---"

          for num in $PR_LIST; do
            echo "Processing PR #$num..."

            # 3. jqのフィルタを強化（大文字小文字無視・日本語対応・改行の修正）
            gh pr view "$num" --repo $REPO --json url,title,comments,reviews | \
            jq -r --arg mentor "$MENTOR" --arg num "$num" '
              # 全てのソースをマージ（1. 全体コメント, 2. 行別コメント, 3. レビュー総評）
              ([
                (.comments // [])[],
                ((.reviews // []) | map(.comments // []) | flatten)[],
                (.reviews // [])[].body | {body: ., author: {login: "unknown"}, createdAt: "unknown"} # 総評を追加
              ]
              # メンターの発言（または作者不明の総評）かつ「タスクらしい」書き方のものを抽出
              | map(select((.author.login == $mentor or .author.login == "unknown") and
                  (.body | test("(^|\\n)(### |\\*\\*|# )?(question|search|質問|課題|調べ)[:：]"; "i"))))
              ) as $filtered

              | if ($filtered | length > 0) then
                  "## [PR #\($num)](\(.url)): \(.title)\n\n" +
                  ($filtered | map("### 💬 フィードバック\n\n> \(.body | gsub("\n"; "\n> "))\n\n---\n") | join("\n\n"))
                else empty end
            ' >> LEARNING_LOG.md
          done

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add LEARNING_LOG.md
          git commit -m "docs: メンターのフィードバック(question/search)を更新 [skip ci]" || echo "No changes to commit"
          git push origin HEAD
