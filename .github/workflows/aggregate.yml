name: Aggregate Learning Logs

on:
  push:
    branches:
      - phase3
  pull_request:
    branches:
      - phase3
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  aggregate_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract conversation logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# 学習記録（Mentor Questions & My Answers）" > LEARNING_LOG.md
          echo "最終更新日: $(date +'%Y-%m-%d %H:%M:%S') (JST)" >> LEARNING_LOG.md
          echo "" >> LEARNING_LOG.md

          REPO="12a1070/Aimag"

          PR_LIST=$(gh pr list --repo $REPO --state all --limit 100 --json number --jq '.[].number')
          ISSUE_LIST=$(gh issue list --repo $REPO --state all --limit 100 --json number --jq '.[].number')

          extract_content() {
            local type=$1
            local num=$2
            local fields="comments"
            if [ "$type" == "pr" ]; then fields="comments,reviews"; fi

            gh $type view "$num" --repo $REPO --json $fields | \
            jq -r --arg num "$num" --arg type "$type" '
              [
                (.comments // [])[],
                ((.reviews // []) | map(.comments // []) | flatten)[]
              ] as $all_comments |

              if ($all_comments | length) > 0 then
                ($all_comments | sort_by(.createdAt)) as $sorted |
                if any($sorted[]; .author.login == "iineineno03k" and (.body | (contains("question") or contains("search")))) then
                  "## " + ($type | ascii_upcase) + " #" + $num + " のやり取り\n" +
                  ([$sorted[] | "### \(.author.login) (\(.createdAt))\n\(.body)\n\n---"] | join("\n")) + "\n"
                else empty end
              else empty end
            ' >> LEARNING_LOG.md
          }

          echo "--- データの抽出を開始します ---"
          for n in $ISSUE_LIST; do extract_content "issue" "$n"; done
          for n in $PR_LIST; do extract_content "pr" "$n"; done

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add LEARNING_LOG.md
          git commit -m "docs: 過去のPR・Issueを含めてログを完全集計 [skip ci]" || echo "No changes to commit"
          git push origin HEAD:phase3
