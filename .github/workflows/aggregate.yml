name: Aggregate Learning Logs

on:
  push:
    branches:
      - phase3 # ← ここを追加
  workflow_dispatch: # ← そのまま
  schedule:
    - cron: "0 0 * * 5" # ← そのまま

jobs:
  aggregate_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract conversation logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# 学習記録（Mentor Questions & My Answers）" > LEARNING_LOG.md
          echo "最終更新日: $(date +'%Y-%m-%d %H:%M:%S')" >> LEARNING_LOG.md
          echo "" >> LEARNING_LOG.md

          # --state all をつけているので過去分も取得します
          PR_LIST=$(gh pr list --repo 12a1070/Aimag --state all --limit 50 --json number --jq '.[].number')

          for num in $PR_LIST; do
            # 全コメント（全体＋レビュー）を統合してチェック
            gh pr view $num --repo 12a1070/Aimag --json comments,reviews \
            --jq '([.comments[], (.reviews // [])[].comments[]]) | sort_by(.createdAt)
                  as $all_comments |
                  if any($all_comments[]; .author.login == "iineineno03k" and (.body | contains("question") or contains("search")))
                  then
                    "## PR #\(num) のやり取り\n" +
                    ([$all_comments[] | "### \(.author.login) (\(.createdAt))\n\(.body)\n\n---"] | join("\n")) + "\n"
                  else empty end' >> LEARNING_LOG.md
          done

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add LEARNING_LOG.md
          # 変更がある場合のみコミット
          git commit -m "docs: 学習ログを自動更新 [skip ci]" || echo "No changes to commit"
          git push
